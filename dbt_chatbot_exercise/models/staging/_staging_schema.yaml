version: 2

models:
  - name: staging_contacts
    description: staging model of contact information from potential bootcamp participants in Hubspot
    columns:
      - name: contact_id
        description: unique identifier for each contact
        tests:
          - unique
          - not_null
      - name: created_at
        description: time and date of creation in Hubspot
        tests:
          - not_null
      - name: company
        description: which company an applicant applied to
      - name: anonymous_id
        description: ID generated by google analytics and assigned to A/B test participants
      - name: experiments
        description: A/B test experiments an applicant was exposed to